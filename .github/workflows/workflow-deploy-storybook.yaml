name: 'Reusable / Deploy storybook'

on:
    workflow_call:
        inputs:
            package:
                required: true
                type: string

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0 # retrieve all the repo history (required by chromatic)

            - name: 'Init variables'
              id: vars
              uses: actions/github-script@v6
              with:
                  result-encoding: json
                  script: |
                      const pkg = '${{ inputs.package }}';

                      let project_token_key;
                      if (pkg === 'react') {
                        project_token_key = 'CHROMATIC_TOKEN_LUMX_REACT';
                      } else if (pkg === 'vue') {
                        project_token_key = 'CHROMATIC_TOKEN_LUMX_VUE';
                      }

                      let run_html_url, storybook_url;
                      if (context.payload.pull_request) {
                        // Link to the current run on github website
                        run_html_url = `${context.payload.repository.html_url}/actions/runs/${context.runId}?pr=${context.payload.pull_request.number}`;

                        // StoryBook URL
                        const utils = require('./.github/actions/utils');
                        const shortSHA = await utils.getShortSHA(context.payload.pull_request.head.sha);
                        storybook_url = utils.getStoryBookURL(shortSHA, 'lumx-${{ inputs.package }}');
                      }

                      return { project_token_key, run_html_url, storybook_url }

            - name: 'Update PR body: Deploying state'
              if: github.event.pull_request
              uses: ./.github/actions/update-pr-body
              with:
                  pattern: 'StoryBook ${{ inputs.package }}: .*'
                  replace: 'StoryBook ${{ inputs.package }}: [Deploying...](${{steps.vars.outputs.result.run_html_url}})'
                  whenNotFound: 'append'
                  keepLastMatch: true

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Deploy chromatic'
              id: deploy
              uses: chromaui/action@d0795df816d05c4a89c80295303970fddd247cce #v13.1.4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  projectToken: ${{ secrets[steps.vars.outputs.result.project_token_key] }}
                  buildScriptName: build:storybook:${{ inputs.package }}

            - if: failure() && github.event.pull_request
              name: 'Update PR body: Failure state'
              uses: ./.github/actions/update-pr-body
              with:
                  pattern: 'StoryBook ${{ inputs.package }}: .*'
                  replace: 'StoryBook ${{ inputs.package }}: [:x: Failed](${{steps.vars.outputs.result.run_html_url}})'
                  whenNotFound: 'ignore'
                  keepLastMatch: true

            - if: "always() && github.event.pull_request && contains(github.event.pull_request.labels.*.name, format('need: deploy-storybook-{0}', inputs.package))"
              name: 'Remove label'
              uses: ./.github/actions/remove-label
              with:
                  label: 'need: deploy-storybook-${{ inputs.package }}'

            - name: 'Update PR body: Deployed state'
              if: github.event.pull_request
              uses: ./.github/actions/update-pr-body
              with:
                  pattern: 'StoryBook ${{ inputs.package }}: .*'
                  replace: 'StoryBook ${{ inputs.package }}: ${{steps.vars.outputs.result.storybook_url}} ([Chromatic build](${{steps.deploy.outputs.buildUrl}}))'
                  whenNotFound: 'append'
                  keepLastMatch: true
