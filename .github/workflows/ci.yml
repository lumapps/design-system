name: 'CI'

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: ${{ github.head_ref }}-validate-pr
    cancel-in-progress: true

jobs:
    check-affected:
        if: github.event.pull_request.draft == false
        uses: ./.github/workflows/workflow-check-affected.yml

    # Run static code check (lint and type-check)
    code-check:
        needs: [check-affected]
        if: github.event.pull_request.draft == false && needs.check-affected.outputs.affected != '[]'
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Run packages code check'
              run: yarn nx run-many -t type-check,lint --projects='${{ needs.check-affected.outputs.affected }}'

    tests:
        needs: [check-affected]
        if: github.event.pull_request.draft == false && needs.check-affected.outputs.affected-test != '[]'
        timeout-minutes: 30
        runs-on: ubuntu-latest
        strategy:
            matrix:
                package: ${{ fromJSON(needs.check-affected.outputs.affected-test) }}
                packageOverrides: ['']
                include:
                    - package: '@lumx/react'
                      packageOverrides: 'react@17.0.2 react-dom@17.0.2 @testing-library/react@12.1.2'
                    - package: '@lumx/react'
                      packageOverrides: 'react@19.1.1 react-dom@19.1.1 @testing-library/react@16.3.0'
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Override package versions'
              if: ${{ matrix.packageOverrides != '' }}
              run: yarn up ${{ matrix.packageOverrides }}

            - name: 'Run ${{ matrix.package }} tests'
              run: |
                  sudo timedatectl set-timezone Europe/Paris
                  yarn workspace ${{ matrix.package }} test

    test-storybook:
        needs: [check-affected]
        if: github.event.pull_request.draft == false && needs.check-affected.outputs.affected-test-storybook != '[]'
        uses: ./.github/workflows/workflow-test-storybook.yml
        with:
            packages: ${{ needs.check-affected.outputs.affected-test-storybook }}
        permissions:
            pull-requests: write
        secrets:
            GITBOT_TOKEN: ${{ secrets.GITBOT_TOKEN }}

    Commit-message-validation:
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Commit message validation'
              uses: lumapps/commit-message-validator@master
              with:
                  no_jira: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Check if build completes
    check-build-site:
        needs: [check-affected]
        if: ${{ contains(fromJSON(needs.check-affected.outputs.modified), 'lumx-site-demo') }}
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Build site'
              run: yarn workspace lumx-site-demo build

    # Fails when the release PR is frozen (marked "Ready for review"),
    # blocking merges to master during release preparation.
    release-freeze-check:
        if: >-
            github.event.pull_request.draft == false &&
            !startsWith(github.head_ref, 'release/')
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Fail if release is frozen'
              uses: ./.github/actions/manage-release-pr
              with:
                  mode: fail-when-frozen
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    # Single required check in branch protection rule.
    # Aggregates all CI jobs so only "required-checks" needs to be required.
    required-checks:
        if: '!cancelled() && github.event.pull_request.draft == false'
        runs-on: ubuntu-latest
        needs: [code-check, test-storybook, tests, Commit-message-validation, release-freeze-check, check-affected, check-build-site]
        steps:
            - name: Success
              if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
              run: exit 0
            - name: Failure
              if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
              run: exit 1

    after-all:
        if: '!cancelled() && needs.required-checks.result == ''success'''
        needs: [required-checks]
        uses: ./.github/workflows/pr-automation.yml
        with:
            ci_passed: true
