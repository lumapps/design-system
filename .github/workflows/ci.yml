name: 'CI'

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: ${{ github.head_ref }}-validate-pr
    cancel-in-progress: true

jobs:
    lint:
        if: github.event.pull_request.draft == false
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Run packages lint'
              run: yarn lint:code

    tests:
        if: github.event.pull_request.draft == false
        timeout-minutes: 30
        runs-on: ubuntu-latest
        strategy:
            matrix:
                package: ['@lumx/core', '@lumx/react', '@lumx/vue']
                packageOverrides: ['']
                include:
                    - package: '@lumx/react'
                      packageOverrides: 'react@17.0.2 react-dom@17.0.2 @testing-library/react@12.1.2'
                    - package: '@lumx/react'
                      packageOverrides: 'react@19.1.1 react-dom@19.1.1 @testing-library/react@16.3.0'
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Override package versions'
              if: ${{ matrix.packageOverrides != '' }}
              run: yarn up ${{ matrix.packageOverrides }}

            - name: 'Run ${{ matrix.package }} tests'
              run: |
                  sudo timedatectl set-timezone Europe/Paris
                  yarn workspace ${{ matrix.package }} test

    type-check:
        if: github.event.pull_request.draft == false
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Run code type check'
              run: yarn type-check

    test-storybook:
        if: github.event.pull_request.draft == false
        uses: ./.github/workflows/workflow-test-storybook.yml
        permissions:
            pull-requests: write
        secrets:
            GITBOT_TOKEN: ${{ secrets.GITBOT_TOKEN }}

    Commit-message-validation:
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Commit message validation'
              uses: lumapps/commit-message-validator@master
              with:
                  no_jira: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Fails when the release/next PR is frozen (marked "Ready for review"),
    # blocking merges to master during release preparation.
    release-freeze-check:
        if: >-
            github.event.pull_request.draft == false &&
            github.head_ref != 'release/next'
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6

            - name: 'Fail if release is frozen'
              uses: ./.github/actions/manage-release-pr
              with:
                  mode: fail-when-frozen
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    # Single required check in branch protection rule.
    # Aggregates all CI jobs so only "required-checks" needs to be required.
    required-checks:
        runs-on: ubuntu-latest
        needs: [lint, test-storybook, tests, type-check, Commit-message-validation, release-freeze-check]
        if: '!cancelled() && github.event.pull_request.draft == false'
        steps:
            - name: Success
              if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
              run: exit 0
            - name: Failure
              if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
              run: exit 1

    after-all:
        needs: [required-checks]
        uses: ./.github/workflows/pr-automation.yml
