name: 'CD / Publish'

# This workflow orchestrates the continuous delivery process for the design system.
# It supports:
# - Official releases triggered by merging a release/<version> PR into 'master'
#   (auto-maintained as a draft PR, freeze by marking it "ready")
# - Automatic prereleases (tag 'next') triggered when a PR merged into 'master' modifies
#   any lib package (packages/lumx-*)
# - Manual prereleases initiated via workflow_dispatch (mode: prerelease, with prereleaseName)
# - Manual release retries via workflow_dispatch (mode: retry-release, to retry a failed release
#   using the version already set in packages). The retry reads the version from package.json,
#   locates the matching "chore(release): release v<version>" commit on the branch and operates
#   on that exact commit (tag, build, deploy). All steps are idempotent: NPM publish skips
#   already-published packages, git tag skips existing tags, and release notes are upserted.
#
# For releases: it builds and publishes NPM packages, creates Git tags,
# deploys the demo site, updates Chromatic, and generates GitHub release notes.
#
# For prereleases: it increments package versions, publishes them to NPM with a prerelease tag.
#
# Release type (patch/minor/major) is auto-detected from CHANGELOG.md.
#
# Freeze behavior:
# - When the release/<version> PR is frozen (marked "Ready"), merges to master are blocked
#   via the "release-freeze-check" CI job (see ci.yml).
# - Prereleases ('next' tag) still publish for PRs merged before the freeze.
# - When the frozen release PR is merged, if CHANGELOG has unreleased changes
#   (from PRs merged before the freeze), a new release/<version> draft PR is auto-created.

on:
    # Trigger on PR merged into master (release/<version> for releases, lib-changing PRs for prereleases)
    pull_request:
        branches:
            - master
        types:
            - closed
    workflow_dispatch:
        inputs:
            mode:
                description: 'What to do.'
                default: 'prerelease'
                required: true
                type: choice
                options:
                    - prerelease
                    - retry-release
            prereleaseName:
                description: 'Prerelease name (only used when mode = prerelease).'
                default: 'alpha'
                required: false
                type: string

permissions:
    id-token: write # Required for OIDC
    contents: read

concurrency:
    group: '${{ github.workflow }}-${{ github.ref_name }}'
    cancel-in-progress: true

jobs:
    check_trigger:
        name: 'Check trigger type'
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.pull_request.merged == true
        outputs:
            version: ${{ steps.check.outputs.version }}
            affected: ${{ steps.check.outputs.affected }}
            # Commit to operate on for release jobs (tag / build / deploy). Empty for prereleases.
            releaseSha: ${{ steps.check.outputs.releaseSha }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: 'Evaluate trigger'
              id: check
              run: |
                  set -ex
                  version=""
                  affected="false"
                  releaseSha=""

                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                      branch="${{ github.event.pull_request.head.ref }}"
                      if [[ "$branch" == release/* ]]; then
                          version=$(echo "$branch" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
                          if [ -z "$version" ]; then
                              version=$(node -p "require('./packages/lumx-core/package.json').version")
                          fi
                          # Release commit is the PR head (where versions were bumped)
                          releaseSha="${{ github.event.pull_request.head.sha }}"
                          # Check if CHANGELOG has unreleased changes (to re-open a release PR after this release)
                          if sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | grep -q '^### '; then
                              affected="true"
                          fi
                      else
                          BASE_SHA="${{ github.event.pull_request.base.sha }}"
                          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
                          echo "Changed files:"
                          echo "$CHANGED"
                          if echo "$CHANGED" | grep -q '^packages/lumx-'; then
                              affected="true"
                          fi
                      fi
                  elif [ "${{ inputs.mode }}" = "retry-release" ]; then
                      # Retry a failed release: reuse the version already set in package.json and
                      # locate the matching release commit on this branch so all release jobs
                      # operate on the exact commit that was published (not a later master HEAD).
                      version=$(node -p "require('./packages/lumx-core/package.json').version")
                      releaseSha=$(git log --no-merges --fixed-strings \
                          --grep="chore(release): release v$version" \
                          --format=%H -n1)
                      if [ -z "$releaseSha" ]; then
                          echo "::error::No release commit found for v$version (expected a 'chore(release): release v$version' commit). Cannot retry."
                          exit 1
                      fi
                      echo "Retrying release v$version at commit $releaseSha"
                  fi

                  [ -n "$version" ] && echo "version=$version" >> "$GITHUB_OUTPUT"
                  [ -n "$releaseSha" ] && echo "releaseSha=$releaseSha" >> "$GITHUB_OUTPUT"
                  echo "affected=$affected" >> "$GITHUB_OUTPUT"

    prepare_release:
        name: 'Update release preview'
        needs: [check_trigger, build_publish_NPM]
        if: >-
            !failure() &&
            needs.check_trigger.outputs.affected == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITBOT_TOKEN }}
                  fetch-depth: 0

            - name: 'Check if release PR is frozen'
              id: check-pr
              uses: ./.github/actions/manage-release-pr
              with:
                  mode: check
                  github-token: ${{ secrets.GITBOT_TOKEN }}

            - name: 'Setup'
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/setup

            - name: 'Detect release type from CHANGELOG'
              id: detect
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/detect-release-type

            - name: 'Increment package versions'
              id: version
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/increment-package-versions
              with:
                  releaseType: '${{ steps.detect.outputs.releaseType }}'

            - name: 'Commit and push release branch'
              if: success() && steps.check-pr.outputs.frozen != 'true'
              run: |
                  git config user.name "lumbot"
                  git config user.email "lumbot@users.noreply.github.com"
                  git commit -am "chore(release): release v${{ steps.version.outputs.nextVersion }}"
                  git push --force origin "${{ steps.version.outputs.releaseBranch }}"

            - name: 'Create or update draft PR'
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/manage-release-pr
              with:
                  mode: update
                  nextVersion: ${{ steps.version.outputs.nextVersion }}
                  prereleaseVersion: ${{ needs.build_publish_NPM.outputs.prereleaseVersion }}
                  run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  github-token: ${{ secrets.GITBOT_TOKEN }}

    build_publish_NPM:
        name: 'Build & publish NPM libs'
        needs: [check_trigger]
        # Use `!failure()` to override the default "skip when dependency is skipped" behavior.
        # When check_trigger is skipped (closed-but-not-merged PRs), the inner condition
        # still evaluates and correctly prevents this job from running.
        if: >-
            !failure() && (
                github.event_name == 'workflow_dispatch' ||
                needs.check_trigger.outputs.version ||
                needs.check_trigger.outputs.affected == 'true'
            )
        permissions:
            id-token: write # Required for OIDC
            contents: read
        runs-on: ubuntu-latest
        outputs:
            distTag: ${{ steps.version.outputs.distTag || 'latest' }}
            prevDistTagVersion: ${{ steps.version.outputs.prevDistTagVersion }}
            prereleaseVersion: ${{ steps.version.outputs.nextVersion }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.check_trigger.outputs.releaseSha || github.event.pull_request.head.sha || github.sha }}
                  # Need to fetch all for the increment package versions step
                  fetch-depth: 0

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Update npm' # Need npm >= v11.5 for trusted publishing
              run: npm install -g npm@latest

            - name: '[prerelease] Detect release type from CHANGELOG'
              id: detect-type
              if: >-
                  !needs.check_trigger.outputs.version &&
                  needs.check_trigger.outputs.affected == 'true'
              uses: ./.github/actions/detect-release-type

            - name: '[prerelease] Increment package versions'
              id: version
              if: >-
                  !needs.check_trigger.outputs.version && (
                      (github.event_name == 'workflow_dispatch' && inputs.mode == 'prerelease') ||
                      needs.check_trigger.outputs.affected == 'true'
                  )
              uses: ./.github/actions/increment-package-versions
              with:
                  releaseType: "pre${{ steps.detect-type.outputs.releaseType || 'patch' }}"
                  prereleaseName: "${{ inputs.prereleaseName || 'next' }}"

            - name: 'Build libs'
              run: yarn build:libs

            - name: 'Publish version to NPM'
              env:
                  DIST_TAG: ${{ steps.version.outputs.distTag || 'latest' }}
              # Idempotent publish: skip packages already published at the target version on the
              # registry. This allows safely retrying a release that partially published (e.g. when
              # one package failed after others succeeded) without aborting on "cannot publish over
              # the previously published versions".
              run: |
                  for package in $(echo packages/lumx-*);
                  do
                      dist="$package/dist"
                      name=$(node -p "require('./$dist/package.json').name")
                      version=$(node -p "require('./$dist/package.json').version")
                      if [ -n "$(npm view "$name@$version" version 2>/dev/null)" ]; then
                          echo "Skipping $name@$version (already published)"
                          continue
                      fi
                      echo "Publishing $name@$version"
                      (cd "$dist" && npm publish --tag "$DIST_TAG")
                  done

    git_tag:
        name: 'Git tag release'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, build_publish_NPM]
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.git.outputs.tag }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6
              with:
                  # Tag the release commit (PR head / located retry commit), not the merge commit
                  ref: ${{ needs.check_trigger.outputs.releaseSha || github.event.pull_request.head.sha || github.sha }}
                  token: '${{ secrets.GITBOT_TOKEN }}'
                  fetch-depth: 0

            - name: 'Git tag'
              id: git
              run: |
                  set -x

                  version="${{ needs.check_trigger.outputs.version }}"
                  tag="v$version"
                  echo "tag=$tag" >> $GITHUB_OUTPUT

                  # Safety: the checked-out commit's package version must match the tag being created.
                  # Guards against tagging the wrong commit (e.g. master HEAD drifted past the release).
                  checkedOut=$(node -p "require('./packages/lumx-core/package.json').version")
                  if [ "$checkedOut" != "$version" ]; then
                      echo "::error::Checked-out version ($checkedOut) does not match release version ($version). Refusing to tag."
                      exit 1
                  fi

                  # Idempotent: skip if tag already exists on remote
                  if git ls-remote --tags origin "$tag" | grep -q "$tag"; then
                      echo "Tag $tag already exists, skipping"
                  else
                      git tag "$tag"
                      git push origin "$tag"
                  fi

    deploy_demo_site:
        name: 'Deploy demo site'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, git_tag] # git_tag not used directly; listed to ensure deploy runs after tag is pushed
        runs-on: ubuntu-latest
        steps:
            - name: 'Trigger deploy demo site workflow'
              env:
                  GH_TOKEN: ${{ secrets.GITBOT_TOKEN }}
              run: |
                  gh workflow run -R ${{ github.repository }} workflow-deploy-demo-site.yml \
                      -f ref=${{ needs.check_trigger.outputs.releaseSha || github.event.pull_request.head.sha || github.sha }} \
                      -f version=${{ needs.check_trigger.outputs.version }}

    create_gh_release:
        name: 'Create release note'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, git_tag]
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6
              with:
                  ref: ${{ needs.check_trigger.outputs.releaseSha || github.event.pull_request.head.sha || github.sha }}

            - name: 'Create release note'
              uses: ./.github/actions/release-note

    bump_lumapps_web:
        name: 'Bump LumX in lumapps-web'
        needs: [check_trigger, build_publish_NPM, deploy_storybook_react]
        if: >-
            !failure() && (
                needs.check_trigger.outputs.version ||
                needs.build_publish_NPM.outputs.distTag == 'next'
            )
        runs-on: ubuntu-latest
        steps:
            - name: 'Trigger lumapps-web bump workflow'
              env:
                  GH_TOKEN: ${{ secrets.GITBOT_TOKEN }}
              run: |
                  ARGS=(-f "version=${{ needs.build_publish_NPM.outputs.distTag }}")
                  STORYBOOK_URL="${{ needs.deploy_storybook_react.outputs.storybook_url }}"
                  if [ -n "$STORYBOOK_URL" ]; then
                      ARGS+=(-f "storybookUrl=$STORYBOOK_URL")
                  fi
                  gh workflow run -R lumapps/lumapps-web workflow-bump-lumx.yml "${ARGS[@]}"

    deploy_storybook_react:
        name: 'Deploy storybook (lumx-react)'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, build_publish_NPM]
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-react
            token_secret: CHROMATIC_TOKEN_LUMX_REACT
            environment: storybook-lumx-react
            # Deploy at the tagged commit (release commit) so Chromatic can match it with the GitHub Release
            ref: ${{ needs.check_trigger.outputs.releaseSha || github.event.pull_request.head.sha || github.sha }}
        secrets: inherit

    deploy_storybook_vue:
        name: 'Deploy storybook (lumx-vue)'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, build_publish_NPM]
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-vue
            token_secret: CHROMATIC_TOKEN_LUMX_VUE
            environment: storybook-lumx-vue
            # Deploy at the tagged commit (release commit) so Chromatic can match it with the GitHub Release
            ref: ${{ needs.check_trigger.outputs.releaseSha || github.event.pull_request.head.sha || github.sha }}
        secrets: inherit
