name: 'CD / Publish'

# This workflow orchestrates the continuous delivery process for the design system.
# It supports:
# - Official releases triggered by merging the release/next PR into 'master'
#   (auto-maintained as a draft PR, freeze by marking it "ready")
# - Automatic prereleases (tag 'next') triggered when a PR merged into 'master' modifies
#   any lib package (packages/lumx-*)
# - Manual prereleases initiated via workflow_dispatch (with prereleaseName)
# - Manual release retries via workflow_dispatch (without prereleaseName, to retry a failed release
#   using the version already set in packages)
#
# For releases: it builds and publishes NPM packages, creates Git tags,
# deploys the demo site, updates Chromatic, and generates GitHub release notes.
#
# For prereleases: it increments package versions, publishes them to NPM with a prerelease tag.
#
# Release type (patch/minor/major) is auto-detected from CHANGELOG.md.
#
# Freeze behavior:
# - When the release/next PR is frozen (marked "Ready"), merges to master are blocked
#   via the "release-freeze-check" CI job (see ci.yml).
# - Prereleases ('next' tag) still publish for PRs merged before the freeze.
# - When the frozen release PR is merged, if CHANGELOG has unreleased changes
#   (from PRs merged before the freeze), a new release/next draft PR is auto-created.

on:
    # Trigger on PR merged into master (release/next for releases, lib-changing PRs for prereleases)
    pull_request:
        branches:
            - master
        types:
            - closed
    workflow_dispatch:
        inputs:
            prereleaseName:
                description: 'Prerelease name (Leave empty to retry a release).'
                default: 'alpha'
                required: false
                type: string

permissions:
    id-token: write # Required for OIDC
    contents: read

concurrency:
    group: '${{ github.workflow }}-${{ github.ref_name }}'
    cancel-in-progress: true

jobs:
    check_trigger:
        name: 'Check trigger type'
        runs-on: ubuntu-latest
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.pull_request.merged == true
        outputs:
            version: ${{ steps.check.outputs.version }}
            affected: ${{ steps.check.outputs.affected }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: 'Evaluate trigger'
              id: check
              run: |
                  set -ex
                  version=""
                  affected="false"

                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                      branch="${{ github.event.pull_request.head.ref }}"
                      if [[ "$branch" == release/* ]]; then
                          version=$(echo "$branch" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
                          if [ -z "$version" ]; then
                              version=$(node -p "require('./packages/lumx-core/package.json').version")
                          fi
                          # Check if CHANGELOG has unreleased changes (to re-open a release PR after this release)
                          if sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | grep -q '^### '; then
                              affected="true"
                          fi
                      else
                          BASE_SHA="${{ github.event.pull_request.base.sha }}"
                          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
                          echo "Changed files:"
                          echo "$CHANGED"
                          if echo "$CHANGED" | grep -q '^packages/lumx-'; then
                              affected="true"
                          fi
                      fi
                  elif [ -z "${{ inputs.prereleaseName }}" ]; then
                      version=$(node -p "require('./packages/lumx-core/package.json').version")
                  fi

                  [ -n "$version" ] && echo "version=$version" >> "$GITHUB_OUTPUT"
                  echo "affected=$affected" >> "$GITHUB_OUTPUT"

    prepare_release_next:
        name: 'Update release/next preview'
        needs: [check_trigger, build_publish_NPM]
        if: >-
            !failure() &&
            needs.check_trigger.outputs.affected == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  token: ${{ secrets.GITBOT_TOKEN }}
                  fetch-depth: 0

            - name: 'Check if release/next PR is frozen'
              id: check-pr
              uses: ./.github/actions/manage-release-pr
              with:
                  mode: check
                  github-token: ${{ secrets.GITBOT_TOKEN }}

            - name: 'Setup'
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/setup

            - name: 'Detect release type from CHANGELOG'
              id: detect
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/detect-release-type

            - name: 'Increment package versions'
              id: version
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/increment-package-versions
              with:
                  releaseType: '${{ steps.detect.outputs.releaseType }}'
                  releaseBranch: 'release/next'

            - name: 'Commit and push release/next'
              if: success() && steps.check-pr.outputs.frozen != 'true'
              run: |
                  git config user.name "lumbot"
                  git config user.email "lumbot@users.noreply.github.com"
                  git commit -am "chore(release): release v${{ steps.version.outputs.nextVersion }}"
                  git push --force origin release/next

            - name: 'Create or update draft PR'
              if: success() && steps.check-pr.outputs.frozen != 'true'
              uses: ./.github/actions/manage-release-pr
              with:
                  mode: update
                  nextVersion: ${{ steps.version.outputs.nextVersion }}
                  prereleaseVersion: ${{ needs.build_publish_NPM.outputs.prereleaseVersion }}
                  run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  github-token: ${{ secrets.GITBOT_TOKEN }}

    build_publish_NPM:
        name: 'Build & publish NPM libs'
        needs: [check_trigger]
        # Use `!failure()` to override the default "skip when dependency is skipped" behavior.
        # When check_trigger is skipped (closed-but-not-merged PRs), the inner condition
        # still evaluates and correctly prevents this job from running.
        if: >-
            !failure() && (
                github.event_name == 'workflow_dispatch' ||
                needs.check_trigger.outputs.version ||
                needs.check_trigger.outputs.affected == 'true'
            )
        permissions:
            id-token: write # Required for OIDC
            contents: read
        runs-on: ubuntu-latest
        outputs:
            distTag: ${{ steps.version.outputs.distTag || 'latest' }}
            prevDistTagVersion: ${{ steps.version.outputs.prevDistTagVersion }}
            prereleaseVersion: ${{ steps.version.outputs.nextVersion }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
                  # Need to fetch all for the increment package versions step
                  fetch-depth: 0

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Update npm' # Need npm >= v11.5 for trusted publishing
              run: npm install -g npm@latest

            - name: '[prerelease] Detect release type from CHANGELOG'
              id: detect-type
              if: >-
                  !needs.check_trigger.outputs.version && (
                      (github.event_name == 'workflow_dispatch' && inputs.prereleaseName) ||
                      needs.check_trigger.outputs.affected == 'true'
                  )
              uses: ./.github/actions/detect-release-type

            - name: '[prerelease] Increment package versions'
              id: version
              if: >-
                  !needs.check_trigger.outputs.version && (
                      (github.event_name == 'workflow_dispatch' && inputs.prereleaseName) ||
                      needs.check_trigger.outputs.affected == 'true'
                  )
              uses: ./.github/actions/increment-package-versions
              with:
                  releaseType: "pre${{ steps.detect-type.outputs.releaseType || 'patch' }}"
                  prereleaseName: "${{ inputs.prereleaseName || 'next' }}"

            - name: 'Build libs'
              run: yarn build:libs

            - name: 'Publish version to NPM'
              env:
                  DIST_TAG: ${{ steps.version.outputs.distTag || 'latest' }}
              run: |
                  for package in $(echo packages/lumx-*);
                  do
                      (echo "Publishing $package"; cd $package/dist; npm publish --tag $DIST_TAG)
                  done

    git_tag:
        name: 'Git tag release'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, build_publish_NPM]
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.git.outputs.tag }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  # Tag the release commit (PR head), not the merge commit
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
                  token: '${{ secrets.GITBOT_TOKEN }}'
                  fetch-depth: 0

            - name: 'Git tag'
              id: git
              run: |
                  set -x

                  # Create tag
                  tag="v${{ needs.check_trigger.outputs.version }}"
                  echo "tag=$tag" >> $GITHUB_OUTPUT
                  git tag "$tag"

                  # Push tag
                  git push origin "$tag"

    deploy_demo_site:
        name: 'Deploy demo site'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, git_tag]
        timeout-minutes: 30
        runs-on: ubuntu-latest
        env:
            GCP_PROD_REGISTRY: gcr.io/lumapps-registry
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}
                  fetch-depth: 0

            - name: 'Login to GCR'
              uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
              with:
                  registry: gcr.io
                  username: _json_key
                  password: ${{ secrets.GCR_PROD_RW_CREDS }}

            - name: 'Setup buildx'
              id: buildx_setup
              uses: docker/setup-buildx-action@8c0edbc76e98fa90f69d9a2c020dcb50019dc325
              with:
                  install: true

            - run: |
                  echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_ENV
                  echo "build_date=$(date --rfc-3339=seconds)" >> $GITHUB_ENV
                  echo "version=${{ needs.git_tag.outputs.tag }}" >> $GITHUB_ENV
                  echo "node_version=$(cat .nvmrc)" >> $GITHUB_ENV

            - name: 'Docker metadata'
              id: meta
              uses: docker/metadata-action@f206c36955d3cc6213c38fb3747d9ba4113e686a
              with:
                  tags: |
                      type=raw,value=${{ env.version }}
                      type=raw,value=${{ env.git_commit }}
                  images: |
                      ${{ env.GCP_PROD_REGISTRY }}/design-system
                  labels: |
                      com.lumapps.image.created=${{ env.build_date }}
                      com.lumapps.image.sha1=${{ env.git_commit }}
                      com.lumapps.image.authors=frontend@lumapps.com
                      com.lumapps.image.version=${{ env.version }}

            - name: 'Build image'
              uses: docker/build-push-action@c56af957549030174b10d6867f20e78cfd7debc5
              with:
                  context: ./
                  file: ./Dockerfile
                  builder: ${{ steps.buildx_setup.outputs.name }}
                  build-args: |
                      version=${{ env.version }}
                      NODE_VERSION=${{ env.node_version }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha, scope=${{ github.workflow }}
                  cache-to: type=gha, scope=${{ github.workflow }}, mode=max

            - name: 'Deploy site'
              env:
                  GH_TOKEN: ${{ secrets.GITBOT_TOKEN }}
              run: gh workflow run -R lumapps/design-system-deployment update-lumx-version.yml

    create_gh_release:
        name: 'Create release note'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, git_tag]
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.pull_request.head.sha || github.sha }}

            - name: 'Create release note'
              uses: ./.github/actions/release-note

    bump_lumapps_web:
        name: 'Bump LumX in lumapps-web'
        needs: [check_trigger, build_publish_NPM]
        if: >-
            !failure() && (
                needs.check_trigger.outputs.version ||
                needs.build_publish_NPM.outputs.distTag == 'next'
            )
        runs-on: ubuntu-latest
        steps:
            - name: 'Trigger lumapps-web bump workflow'
              env:
                  GH_TOKEN: ${{ secrets.GITBOT_TOKEN }}
              run: |
                  gh workflow run -R lumapps/lumapps-web workflow-bump-lumx.yml \
                      -f version=${{ needs.build_publish_NPM.outputs.distTag }}

    deploy_storybook_react:
        name: 'Deploy storybook (lumx-react)'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, build_publish_NPM]
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-react
            token_secret: CHROMATIC_TOKEN_LUMX_REACT
            environment: storybook-lumx-react
        secrets: inherit

    deploy_storybook_vue:
        name: 'Deploy storybook (lumx-vue)'
        if: needs.check_trigger.outputs.version
        needs: [check_trigger, build_publish_NPM]
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-vue
            token_secret: CHROMATIC_TOKEN_LUMX_VUE
            environment: storybook-lumx-vue
        secrets: inherit
