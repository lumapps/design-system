name: 'Deploy Storybook'

on:
    workflow_call:
        inputs:
            package:
                description: 'Package name (e.g. lumx-react or lumx-vue)'
                required: true
                type: string
            token_secret:
                description: 'Secret name for Chromatic project token'
                required: true
                type: string
            environment:
                description: 'GitHub environment name (set on release deploys only)'
                required: false
                type: string
                default: ''
            pr_number:
                description: 'PR number for body updates (empty = skip updates)'
                required: false
                type: string
                default: ''
        outputs:
            storybook_url:
                description: 'Chromatic permalink for the deployed Storybook'
                value: ${{ jobs.deploy.outputs.storybook_url }}
        secrets:
            GITBOT_TOKEN:
                description: 'GitHub token with write access to PRs (used for PR body updates, bypasses Dependabot token restrictions)'
                required: false

jobs:
    deploy:
        name: 'Deploy chromatic (${{ inputs.package }})'
        runs-on: ubuntu-latest
        outputs:
            storybook_url: ${{ steps.vars.outputs.storybook_url }}
        concurrency:
            group: storybook-${{ inputs.package }}-${{ github.head_ref || github.ref_name }}
            cancel-in-progress: true
        environment:
            name: ${{ inputs.environment }}
            url: ${{ steps.vars.outputs.storybook_url }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: 'Init variables'
              id: vars
              uses: actions/github-script@v8
              with:
                  result-encoding: json
                  script: |
                      const { getShortSHA, getStoryBookURL, getRunURL } = require('./.github/actions/utils.js');
                      const packageName = '${{ inputs.package }}';
                      const prNumber = '${{ inputs.pr_number }}';

                      const package_path = `packages/${packageName}`;
                      const run_html_url = getRunURL(context.payload.repository.html_url, context.runId, prNumber);
                      const shortSHA = await getShortSHA(context.sha);
                      const storybook_url = getStoryBookURL(shortSHA, packageName);

                      core.setOutput('storybook_url', storybook_url);
                      core.setOutput('run_html_url', run_html_url);
                      core.setOutput('package_path', package_path);

            - name: 'Update PR body: Deploying state'
              id: update-pr-deploying
              if: inputs.pr_number != ''
              continue-on-error: true
              uses: ./.github/actions/update-pr-body
              with:
                  github_token: ${{ secrets.GITBOT_TOKEN || github.token }}
                  pull_number: ${{ inputs.pr_number }}
                  pattern: 'StoryBook ${{ inputs.package }}: [^\n]*'
                  replace: 'StoryBook ${{ inputs.package }}: [Deploying...](${{ steps.vars.outputs.run_html_url }})'
                  whenNotFound: 'append'
                  keepLastMatch: true

            - name: 'Warn: PR body update skipped (Deploying)'
              if: steps.update-pr-deploying.outcome == 'failure'
              run: echo "::warning::Could not update PR body (deploying state). The token may lack write access to pull requests (e.g. Dependabot PRs)."

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Generate demo stories'
              run: yarn workspace lumx-site-demo generate:demo-stories

            - name: 'Deploy chromatic'
              id: deploy
              env:
                  CHROMATIC_PROJECT_TOKEN: ${{ secrets[inputs.token_secret] }}
              run: yarn dlx chromatic --exit-once-uploaded
              working-directory: ${{ steps.vars.outputs.package_path }}

            - name: 'Update PR body: Failure state'
              id: update-pr-failure
              if: failure() && inputs.pr_number != ''
              continue-on-error: true
              uses: ./.github/actions/update-pr-body
              with:
                  github_token: ${{ secrets.GITBOT_TOKEN || github.token }}
                  pull_number: ${{ inputs.pr_number }}
                  pattern: 'StoryBook ${{ inputs.package }}: [^\n]*'
                  replace: 'StoryBook ${{ inputs.package }}: [:x: Failed](${{ steps.vars.outputs.run_html_url }})'
                  whenNotFound: 'ignore'
                  keepLastMatch: true

            - name: 'Warn: PR body update skipped (Failure)'
              if: steps.update-pr-failure.outcome == 'failure'
              run: echo "::warning::Could not update PR body (failure state). The token may lack write access to pull requests (e.g. Dependabot PRs)."

            - name: 'Update PR body: Deployed state'
              id: update-pr-deployed
              if: inputs.pr_number != ''
              continue-on-error: true
              uses: ./.github/actions/update-pr-body
              with:
                  github_token: ${{ secrets.GITBOT_TOKEN || github.token }}
                  pull_number: ${{ inputs.pr_number }}
                  pattern: 'StoryBook ${{ inputs.package }}: [^\n]*'
                  replace: 'StoryBook ${{ inputs.package }}: ${{ steps.vars.outputs.storybook_url }}'
                  whenNotFound: 'append'
                  keepLastMatch: true

            - name: 'Warn: PR body update skipped (Deployed)'
              if: steps.update-pr-deployed.outcome == 'failure'
              run: echo "::warning::Could not update PR body (deployed state). The token may lack write access to pull requests (e.g. Dependabot PRs)."
