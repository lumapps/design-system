name: 'PR Automation'

on:
    # Triggered when the CI workflow completes (requires workflow to be on default branch)
    workflow_run:
        workflows: ['CI']
        types: [completed]
    # Triggered when a PR is marked as ready for review
    pull_request:
        types: [ready_for_review]
    # Triggered when a review is submitted
    pull_request_review:
        types: [submitted]

jobs:
    # Add 'need: review-frontend' when CI passes on a non-draft PR with no reviews yet
    add-review-label:
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_run' || github.event_name == 'pull_request'
        permissions:
            pull-requests: read
            issues: write
        steps:
            - name: Add review label if CI passes and no reviews
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
              shell: bash
              run: |
                  # Resolve PR number from the event
                  if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
                      PR_NUMBER=$(echo '${{ toJSON(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number')
                  else
                      PR_NUMBER="${{ github.event.pull_request.number }}"
                  fi

                  if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
                      echo "No PR associated, skipping."
                      exit 0
                  fi

                  echo "Processing PR #$PR_NUMBER"

                  # Get PR data as JSON
                  PR_JSON=$(gh pr view "$PR_NUMBER" --json isDraft,labels,reviewDecision,statusCheckRollup)

                  # Skip draft PRs or PRs with "in progress" / "need: dev*" labels
                  SKIP=$(echo "$PR_JSON" | jq -r '
                      .isDraft or (.labels | any(.name | test("in progress") or startswith("need: dev")))
                  ')
                  if [[ "$SKIP" == "true" ]]; then
                      echo "PR is draft or has in-progress/dev label, skipping."
                      exit 0
                  fi

                  # Check if PR has any review decisions
                  REVIEW_DECISION=$(echo "$PR_JSON" | jq -r '.reviewDecision')
                  if [[ "$REVIEW_DECISION" == "APPROVED" || "$REVIEW_DECISION" == "CHANGES_REQUESTED" ]]; then
                      echo "Already has reviews ($REVIEW_DECISION), skipping."
                      exit 0
                  fi

                  # Check all CI checks pass
                  FAILING=$(echo "$PR_JSON" | jq '
                      .statusCheckRollup
                      | map(select(.conclusion != "SUCCESS" and .conclusion != "SKIPPED" and .conclusion != "NEUTRAL"))
                  ')
                  if [[ $(echo "$FAILING" | jq 'length') -gt 0 ]]; then
                      echo "CI not fully passing:"
                      echo "$FAILING" | jq -r '.[] | "  - \(.name): \(.status) / \(.conclusion)"'
                      exit 0
                  fi

                  # All conditions met
                  echo "CI passes, no reviews yet. Adding 'need: review-frontend'."
                  gh pr edit "$PR_NUMBER" --add-label "need: review-frontend"

    # Replace 'need: review-frontend' with 'need: test' when all required reviews are approved
    update-test-label:
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request_review'
        permissions:
            pull-requests: write
            issues: write
        steps:
            - name: Update labels on approval
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              shell: bash
              run: |
                  echo "Processing PR #$PR_NUMBER"

                  # Get PR review decision
                  REVIEW_DECISION=$(gh pr view "$PR_NUMBER" --json reviewDecision -q '.reviewDecision')
                  echo "  Review decision: $REVIEW_DECISION"

                  if [[ "$REVIEW_DECISION" != "APPROVED" ]]; then
                      echo "  Not fully approved yet, skipping."
                      exit 0
                  fi

                  # Remove 'need: review-frontend' (--remove-label is silent if label is absent)
                  gh pr edit "$PR_NUMBER" --remove-label "need: review-frontend" || true
                  echo "  Removed 'need: review-frontend'."

                  # Add 'need: test'
                  gh pr edit "$PR_NUMBER" --add-label "need: test"
                  echo "  Added 'need: test'."
