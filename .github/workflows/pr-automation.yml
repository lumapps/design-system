name: 'PR Automation'

on:
    # Triggered when a review is submitted
    pull_request_review:
        types: [submitted]
    # Triggered when a label is removed (e.g. "in progress" or "need: dev*" removed)
    pull_request:
        types: [unlabeled]
    # Triggered from another workflow
    workflow_call:

jobs:
    # Add 'need: review-frontend' (triggered from CI workflow or when removing "in progress" label on a PR)
    add-review-label:
        if: "${{ github.event.action != 'unlabeled' || github.event.label.name != 'need: review-frontend' }}"
        continue-on-error: true
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            issues: write
        steps:
            - name: Add review label if CI passes and no reviews
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              shell: bash
              run: |
                  echo "Processing PR #$PR_NUMBER"

                  # Get PR data as JSON
                  PR_JSON=$(gh pr view "$PR_NUMBER" --json isDraft,labels,reviewDecision)

                  # Skip draft PRs or PRs with "in progress" / "need: dev*" / "need: review-frontend" labels
                  SKIP=$(echo "$PR_JSON" | jq -r '
                      .isDraft or (.labels | any(.name | test("in progress") or startswith("need: dev") or . == "need: review-frontend"))
                  ')
                  if [[ "$SKIP" == "true" ]]; then
                      echo "PR is draft, has in-progress/dev label, or already has review label, skipping."
                      exit 0
                  fi

                  # Check if PR has any review decisions
                  REVIEW_DECISION=$(echo "$PR_JSON" | jq -r '.reviewDecision')
                  if [[ "$REVIEW_DECISION" == "APPROVED" || "$REVIEW_DECISION" == "CHANGES_REQUESTED" ]]; then
                      echo "Already has reviews ($REVIEW_DECISION), skipping."
                      exit 0
                  fi

                  # Check if all CI checks have passed
                  CI_STATUS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup \
                      --jq '[.statusCheckRollup[] | select(.workflowName == "CI" and (.name | startswith("after-all") | not))] | if length == 0 then "PENDING" elif all(.conclusion == "SUCCESS") then "SUCCESS" else "FAILING" end')
                  echo "CI status: $CI_STATUS"
                  if [[ "$CI_STATUS" != "SUCCESS" ]]; then
                      echo "CI has not passed yet, skipping."
                      exit 0
                  fi

                  # All conditions met
                  echo "CI passes, no reviews yet. Adding 'need: review-frontend'."
                  gh pr edit "$PR_NUMBER" --add-label "need: review-frontend"

    # Replace 'need: review-frontend' with 'need: test' when all required reviews are approved
    update-test-label:
        continue-on-error: true
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request_review'
        permissions:
            pull-requests: write
            issues: write
        steps:
            - name: Update labels on approval
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              shell: bash
              run: |
                  echo "Processing PR #$PR_NUMBER"

                  # Get PR review decision
                  REVIEW_DECISION=$(gh pr view "$PR_NUMBER" --json reviewDecision -q '.reviewDecision')
                  echo "  Review decision: $REVIEW_DECISION"

                  if [[ "$REVIEW_DECISION" != "APPROVED" ]]; then
                      echo "  Not fully approved yet, skipping."
                      exit 0
                  fi

                  # Remove 'need: review-frontend' (--remove-label is silent if label is absent)
                  gh pr edit "$PR_NUMBER" --remove-label "need: review-frontend" || true
                  echo "  Removed 'need: review-frontend'."

                  # Add 'need: test'
                  gh pr edit "$PR_NUMBER" --add-label "need: test"
                  echo "  Added 'need: test'."
