name: 'CD / Deploy storybook'

# Deploy Storybook (Chromatic) on PRs.
# Uses `nx affected` to only deploy storybooks for packages impacted by the PR changes.
# Release deploys (master) are handled by cd-publish.yml.

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: storybook-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    check-affected:
        uses: ./.github/workflows/workflow-check-affected.yml

    deploy-react:
        name: 'Deploy storybook (lumx-react)'
        needs: [check-affected]
        if: ${{ contains(fromJSON(needs.check-affected.outputs.affected), '@lumx/react') }}
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-react
            token_secret: CHROMATIC_TOKEN_LUMX_REACT
            pr_number: ${{ github.event.pull_request.number }}
        secrets: inherit

    deploy-vue:
        name: 'Deploy storybook (lumx-vue)'
        needs: [check-affected]
        if: ${{ contains(fromJSON(needs.check-affected.outputs.affected), '@lumx/vue') }}
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-vue
            token_secret: CHROMATIC_TOKEN_LUMX_VUE
            pr_number: ${{ github.event.pull_request.number }}
        secrets: inherit
