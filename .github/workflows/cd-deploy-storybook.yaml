name: 'CD / Deploy storybook'

# Deploy Storybook (Chromatic) on PRs.
# Uses `nx affected` to only deploy storybooks for packages impacted by the PR changes.
# Release deploys (master) are handled by cd-publish.yml.

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: storybook-${{ github.head_ref }}
    cancel-in-progress: true

jobs:
    check-affected:
        name: 'Check affected storybooks'
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        outputs:
            react: ${{ steps.check.outputs.react }}
            vue: ${{ steps.check.outputs.vue }}
        steps:
            - name: 'Checkout repository'
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: 'Setup'
              uses: ./.github/actions/setup

            - name: 'Check affected packages'
              id: check
              run: |
                  AFFECTED=$(npx nx show projects --affected --base=origin/master --head=HEAD)
                  echo "Affected projects:"
                  echo "$AFFECTED"
                  echo "react=$( echo "$AFFECTED" | grep -q '@lumx/react' && echo true || echo false )" >> "$GITHUB_OUTPUT"
                  echo "vue=$( echo "$AFFECTED" | grep -q '@lumx/vue' && echo true || echo false )" >> "$GITHUB_OUTPUT"

    deploy-react:
        name: 'Deploy storybook (lumx-react)'
        needs: [check-affected]
        if: needs.check-affected.outputs.react == 'true'
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-react
            token_secret: CHROMATIC_TOKEN_LUMX_REACT
            pr_number: ${{ github.event.pull_request.number }}
        secrets: inherit

    deploy-vue:
        name: 'Deploy storybook (lumx-vue)'
        needs: [check-affected]
        if: needs.check-affected.outputs.vue == 'true'
        uses: ./.github/workflows/workflow-deploy-storybook.yml
        with:
            package: lumx-vue
            token_secret: CHROMATIC_TOKEN_LUMX_VUE
            pr_number: ${{ github.event.pull_request.number }}
        secrets: inherit
