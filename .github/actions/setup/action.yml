name: 'Setup'
description: 'Full CI env setup (setup node & restore/install dependencies)'

inputs:
    playwright:
        description: 'Install Playwright Chromium browser'
        required: false
        default: 'false'
    focus:
        description: 'Package name to focus install (skips cache and runs yarn workspaces focus <pkg>)'
        required: false
        default: ''

runs:
    using: composite
    steps:
        -   name: "Setup node env"
            uses: actions/setup-node@v6
            with:
                registry-url: 'https://registry.npmjs.org'
                node-version-file: '.nvmrc'
                cache: yarn

        -   name: "Cache dependencies"
            if: inputs.focus == ''
            id: cache
            uses: actions/cache@v5
            with:
                path: '**/node_modules'
                key: ${{ runner.os }}-node-v${{ inputs.node_version }}-dependency-hash-${{ hashFiles('yarn.lock') }}
                restore-keys: |
                    ${{ runner.os }}-node-v${{ inputs.node_version }}-dependency-hash-

        -   name: "Install dependencies"
            if: inputs.focus == ''
            run: yarn install
            shell: bash

        -   name: "Install only one workspace"
            if: inputs.focus != ''
            run: yarn workspaces focus ${{ inputs.focus }}
            shell: bash

        - name: 'Cache Playwright browsers'
          if: inputs.playwright == 'true'
          id: playwright-cache
          uses: actions/cache@v5
          with:
              path: ~/.cache/ms-playwright
              key: ${{ runner.os }}-playwright-${{ hashFiles('yarn.lock') }}

        - name: 'Install Playwright Chromium'
          if: inputs.playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
          run: yarn playwright install chromium
          shell: bash
